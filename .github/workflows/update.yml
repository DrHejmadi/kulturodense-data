name: Opdater feed
on:
  schedule:
    - cron: "30 4 * * *"   # dagligt kl. 04:30 UTC (efter datakilders vedligehold)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byg feed.json
        env:
          GUIDEDANMARK_USER: ${{ secrets.GUIDEDANMARK_USER }}
          GUIDEDANMARK_PASS: ${{ secrets.GUIDEDANMARK_PASS }}
          GUIDEDANMARK_ODENSE_MUNICIPALITY_ID: ${{ secrets.GUIDEDANMARK_ODENSE_MUNICIPALITY_ID }}
        run: python build_feed.py feed.json
      - name: Commit ved ændring
        run: |
          git config user.name "kulturodense-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet feed.json; then
            git add feed.json
            git commit -m "Auto-opdatering af feed $(date -u +%FT%TZ)"
            git push
          else
            echo "Ingen ændringer"
          fi
